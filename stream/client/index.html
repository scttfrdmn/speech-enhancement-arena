<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Streaming Arena</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; color: #222; }
  h1 { margin-top: 0; }
  .row { display: flex; gap: 0.5rem; align-items: center; margin: 0.5rem 0; }
  .row label { min-width: 180px; }
  button { padding: 0.6rem 1.2rem; font-size: 1rem; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #status { padding: 0.6rem 1rem; background: #f4f4f4; border-radius: 4px; margin: 1rem 0; font-family: monospace; white-space: pre-wrap; font-size: 0.85rem; line-height: 1.4; max-height: 280px; overflow-y: auto; }
  #meter { width: 100%; height: 18px; background: #eee; border-radius: 4px; overflow: hidden; }
  #meter > div { height: 100%; background: linear-gradient(to right, #4caf50, #ff9800, #f44336); width: 0%; transition: width 60ms linear; }
  .dim { color: #888; }
  code { background: #f4f4f4; padding: 0 0.3em; border-radius: 2px; }
  #pipeline { display: block; width: 100%; border: 1px solid #ddd; border-radius: 4px; margin: 1rem 0; background: #fafafa; }
  #pipelineStats { font-size: 0.8rem; color: #666; margin-top: 0.5rem; }
  .spec-container { display: flex; gap: 1rem; margin: 1rem 0; }
  .spec-box { flex: 1; }
  .spec-box h3 { margin: 0 0 0.5rem 0; font-size: 0.9rem; color: #666; }
  .spec-box canvas { width: 100%; border: 1px solid #ddd; border-radius: 4px; background: #000; display: block; }
</style>
</head>
<body>
<h1>Streaming Arena</h1>

<canvas id="pipeline" width="800" height="120"></canvas>
<div id="pipelineStats" class="dim">Ready to stream...</div>

<div class="row">
  <label for="endpoint">Backend</label>
  <select id="endpoint" style="flex:1">
    <option value="">Local (same as page)</option>
  </select>
  <button id="btnAddEndpoint" style="padding:0.4rem 0.8rem;font-size:0.9rem">Add Endpoint</button>
</div>

<div class="row">
  <label for="inDev">Input device</label>
  <select id="inDev" style="flex:1"></select>
</div>
<div class="row">
  <label for="outDev">Output device</label>
  <select id="outDev" style="flex:1"></select>
</div>
<div class="row">
  <label for="modelSel">Model</label>
  <select id="modelSel" style="flex:1"><option value="">loading…</option></select>
  <span id="modelMeta" class="dim" style="font-size:0.8rem;margin-left:0.5rem"></span>
</div>
<div class="row">
  <label>
    <input type="checkbox" id="bypass" />
    Bypass (hear raw input)
  </label>
</div>
<div class="row">
  <label>Input level</label>
  <div id="meter" style="flex:1"><div></div></div>
</div>
<div class="row">
  <button id="btnStart">Start</button>
  <button id="btnStop" disabled>Stop</button>
  <button id="btnTone">Test Tone</button>
  <button id="btnMonitor">Monitor (no WS)</button>
  <span id="rtt" class="dim"></span>
</div>

<div class="spec-container">
  <div class="spec-box">
    <h3>Input Spectrum</h3>
    <canvas id="inputSpec" width="300" height="150"></canvas>
  </div>
  <div class="spec-box">
    <h3>Output Spectrum (Enhanced)</h3>
    <canvas id="outputSpec" width="300" height="150"></canvas>
  </div>
</div>

<pre id="status">Idle.</pre>

<script type="module">
// Nominal capture/playback rate. Chrome frequently ignores this for the
// AudioContext on macOS and uses the system output rate (often 48000).
// We detect the actual rate at construction and drive everything from there.
const TARGET_RATE = 16000;
const FRAME_MS = 16;              // chunk duration
// Backend endpoint selection: defaults to same-origin, can switch via dropdown
const getServerHost = () => {
  const selected = $("endpoint").value;
  return selected || location.host;
};
const wsUrl = () => `ws://${getServerHost()}/ws?model=${encodeURIComponent($("modelSel").value || "conv_mask")}&bypass=${$("bypass").checked ? 1 : 0}`;
const modelsUrl = () => `http://${getServerHost()}/api/models`;
const infoUrl = () => `http://${getServerHost()}/api/info`;

const $ = (id) => document.getElementById(id);
const log = (msg) => { $("status").textContent = new Date().toLocaleTimeString() + "  " + msg + "\n" + $("status").textContent; };
const meter = $("meter").firstElementChild;

let audioCtx = null;
let actualRate = TARGET_RATE;
let frameSamples = Math.round(TARGET_RATE * FRAME_MS / 1000);
let micStream = null;
let ws = null;
let nextPlaybackTime = 0;
let framesSent = 0;
let framesRecv = 0;
let lastSendTime = 0;
let rttMs = 0;

// Pipeline visualization state
const pipeline = {
  nodes: [
    { id: "mic", label: "🎤 Mic", x: 60, y: 60 },
    { id: "browser", label: "💻 Browser", x: 220, y: 60 },
    { id: "aws", label: "☁️ ...", x: 420, y: 60 },
    { id: "model", label: "🧠 Model", x: 620, y: 60 },
    { id: "speakers", label: "🔊 Speakers", x: 740, y: 60 }
  ],
  edges: [
    { from: "mic", to: "browser" },
    { from: "browser", to: "aws" },
    { from: "aws", to: "model" },
    { from: "model", to: "speakers" }
  ],
  packets: [], // {fromId, toId, progress: 0-1, color}
  deviceColor: "#666"
};

// Spectrogram state
let inputAnalyser = null;
let outputAnalyser = null;
let animationId = null;

function drawPipeline() {
  const canvas = $("pipeline");
  const ctx = canvas.getContext("2d");
  const w = canvas.width, h = canvas.height;

  ctx.clearRect(0, 0, w, h);

  // Draw edges
  ctx.strokeStyle = "#ddd";
  ctx.lineWidth = 2;
  for (const edge of pipeline.edges) {
    const from = pipeline.nodes.find(n => n.id === edge.from);
    const to = pipeline.nodes.find(n => n.id === edge.to);
    if (!from || !to) continue;
    ctx.beginPath();
    ctx.moveTo(from.x, from.y);
    ctx.lineTo(to.x, to.y);
    ctx.stroke();
  }

  // Draw packets (animated dots)
  for (const p of pipeline.packets) {
    const from = pipeline.nodes.find(n => n.id === p.fromId);
    const to = pipeline.nodes.find(n => n.id === p.toId);
    if (!from || !to) continue;
    const x = from.x + (to.x - from.x) * p.progress;
    const y = from.y + (to.y - from.y) * p.progress;
    ctx.fillStyle = p.color || "#4caf50";
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, 2 * Math.PI);
    ctx.fill();
  }

  // Draw nodes
  ctx.font = "14px system-ui";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  for (const node of pipeline.nodes) {
    ctx.fillStyle = node.id === "aws" ? pipeline.deviceColor : "#666";
    ctx.fillText(node.label, node.x, node.y);
  }
}

function updatePipeline() {
  const now = Date.now();
  // Advance packet positions (speed: 0.05 progress per frame @ 60fps ≈ 333ms travel time)
  for (let i = pipeline.packets.length - 1; i >= 0; i--) {
    pipeline.packets[i].progress += 0.05;
    if (pipeline.packets[i].progress >= 1) {
      pipeline.packets.splice(i, 1);
    }
  }
  drawPipeline();

  // Update stats
  if (ws && ws.readyState === WebSocket.OPEN) {
    const stats = `Latency: ${rttMs}ms | Sent: ${framesSent} | Recv: ${framesRecv}`;
    $("pipelineStats").textContent = stats;
  }
}

function drawSpectrograms() {
  if (!inputAnalyser || !outputAnalyser) return;

  const inputCanvas = $("inputSpec");
  const outputCanvas = $("outputSpec");
  const inputCtx = inputCanvas.getContext("2d");
  const outputCtx = outputCanvas.getContext("2d");

  const bufLen = inputAnalyser.frequencyBinCount;
  const inputData = new Uint8Array(bufLen);
  const outputData = new Uint8Array(bufLen);

  inputAnalyser.getByteFrequencyData(inputData);
  outputAnalyser.getByteFrequencyData(outputData);

  const draw = (ctx, data, width, height) => {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, width, height);
    const barWidth = width / bufLen;
    for (let i = 0; i < bufLen; i++) {
      const barHeight = (data[i] / 255) * height;
      // Green for speech range (roughly bins 10-100 at 48kHz), gray otherwise
      ctx.fillStyle = (i > 10 && i < 100) ? "#4caf50" : "#666";
      ctx.fillRect(i * barWidth, height - barHeight, barWidth, barHeight);
    }
  };

  draw(inputCtx, inputData, inputCanvas.width, inputCanvas.height);
  draw(outputCtx, outputData, outputCanvas.width, outputCanvas.height);
}

function animate() {
  updatePipeline();
  drawSpectrograms();
  animationId = requestAnimationFrame(animate);
}

async function loadServerInfo() {
  try {
    const resp = await fetch(infoUrl());
    if (!resp.ok) return;
    const info = await resp.json();
    // Update AWS node label with instance type
    const awsNode = pipeline.nodes.find(n => n.id === "aws");
    if (awsNode) {
      awsNode.label = `☁️ ${info.instance_type || "unknown"}`;
    }
    // Color code by hardware family: green for Trainium/Inferentia (trn*/inf*),
    // blue for NVIDIA GPU instances (g*/p*), gray otherwise.
    const itype = (info.instance_type || "").toLowerCase();
    if (itype.startsWith("trn") || itype.startsWith("inf")) {
      pipeline.deviceColor = "#4caf50"; // green
    } else if (itype.startsWith("g") || itype.startsWith("p")) {
      pipeline.deviceColor = "#2196f3"; // blue
    } else if (info.device && info.device.includes("cuda")) {
      pipeline.deviceColor = "#2196f3"; // blue (fallback)
    } else if (info.device && info.device.includes("xla")) {
      pipeline.deviceColor = "#4caf50"; // green (fallback, legacy XLA path)
    }
    drawPipeline();
    log(`server: ${info.instance_type || "unknown"} (${info.device}) in ${info.region || "?"}`);
  } catch (e) {
    log("warn: could not load server info (" + e.message + ")");
  }
}

async function ensureCtx() {
  if (audioCtx && audioCtx.state !== "closed") return audioCtx;
  // Don't force sampleRate — let Chrome use the device's native rate (the
  // Scarlett is 48 kHz). Chrome's USB-audio resampler to a non-native rate
  // has been observed to feed AudioWorklet inputs zero samples on macOS.
  // We'll sidestep the resample on capture and run playback at the same
  // native rate. Any rate conversion we need can happen server-side later.
  audioCtx = new AudioContext({ latencyHint: "interactive" });
  actualRate = audioCtx.sampleRate;
  frameSamples = Math.round(actualRate * FRAME_MS / 1000);
  // CRITICAL: reset playback clock for the new context. AudioContext.currentTime
  // starts at ~0 for each new context, but nextPlaybackTime carries over from
  // the previous session's closed context — which would schedule every frame
  // of this session far in the future (silent).
  nextPlaybackTime = 0;
  framesSent = 0;
  framesRecv = 0;
  log(`ctx: rate=${actualRate} Hz, frameSamples=${frameSamples}, state=${audioCtx.state}`);
  if (audioCtx.state === "suspended") {
    try { await audioCtx.resume(); log(`ctx resumed, state=${audioCtx.state}`); } catch (e) { log("resume err: " + e.message); }
  }
  // Route to the selected output device if the browser supports it.
  const outId = $("outDev").value;
  if (outId && typeof audioCtx.setSinkId === "function") {
    try {
      await audioCtx.setSinkId(outId);
      log("ctx sinkId set to " + ($("outDev").selectedOptions[0]?.textContent || outId));
    } catch (e) { log("setSinkId err: " + e.message); }
  } else if (outId) {
    log("warn: AudioContext.setSinkId not supported in this browser; using system default output");
  }
  return audioCtx;
}

async function playTone() {
  await ensureCtx();
  const dur = 0.4;
  const n = Math.round(dur * actualRate);
  const buf = audioCtx.createBuffer(2, n, actualRate);
  for (let ch = 0; ch < 2; ch++) {
    const out = buf.getChannelData(ch);
    for (let i = 0; i < n; i++) out[i] = 0.25 * Math.sin(2 * Math.PI * 440 * i / actualRate);
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  src.start();
  log(`test tone: 440 Hz, ${dur*1000} ms @ ${actualRate} Hz`);
}

async function listDevices() {
  // Prompt once so device labels populate.
  try {
    const s = await navigator.mediaDevices.getUserMedia({ audio: true });
    s.getTracks().forEach(t => t.stop());
  } catch (e) { /* permission denied; continue */ }
  const devices = await navigator.mediaDevices.enumerateDevices();
  const inDev = $("inDev"), outDev = $("outDev");
  inDev.innerHTML = ""; outDev.innerHTML = "";
  for (const d of devices) {
    const opt = document.createElement("option");
    opt.value = d.deviceId;
    opt.textContent = d.label || `(${d.kind})`;
    if (d.kind === "audioinput") inDev.appendChild(opt);
    else if (d.kind === "audiooutput") outDev.appendChild(opt.cloneNode(true));
  }
}

let captureReader = null;
let captureActive = false;

async function start() {
  $("btnStart").disabled = true;
  if (typeof MediaStreamTrackProcessor === "undefined") {
    log("ERR: MediaStreamTrackProcessor not available in this browser");
    $("btnStart").disabled = false;
    return;
  }
  await ensureCtx();

  const constraints = {
    audio: {
      deviceId: $("inDev").value ? { exact: $("inDev").value } : undefined,
      echoCancellation: false,
      noiseSuppression: false,
      autoGainControl: false,
      channelCount: 1,
    }
  };
  micStream = await navigator.mediaDevices.getUserMedia(constraints);
  const track = micStream.getAudioTracks()[0];
  log(`mic track: label="${track.label}" state=${track.readyState} muted=${track.muted} enabled=${track.enabled}`);
  log(`track settings: ${JSON.stringify(track.getSettings())}`);

  // MediaStreamTrackProcessor reads AudioData frames directly from the
  // track — bypasses the Web Audio graph entirely for capture, avoiding
  // the known macOS Chrome bug where MediaStreamSource → AudioWorklet
  // delivers zero samples while the same micSrc feeds destination fine.
  const processor = new MediaStreamTrackProcessor({ track });
  captureReader = processor.readable.getReader();
  captureActive = true;

  frameSamples = Math.round(actualRate * FRAME_MS / 1000);

  // Create analysers for spectrograms
  inputAnalyser = audioCtx.createAnalyser();
  inputAnalyser.fftSize = 256;
  outputAnalyser = audioCtx.createAnalyser();
  outputAnalyser.fftSize = 256;

  // Connect mic to input analyser (we'll feed it from the capture pump)
  // For now, create a dummy source - we'll update with actual audio later via scriptProcessor workaround
  // Actually, we can connect the MediaStreamSource to inputAnalyser
  const micSrc = audioCtx.createMediaStreamSource(micStream);
  micSrc.connect(inputAnalyser);

  // Start animation loop
  if (!animationId) animate();

  ws = new WebSocket(wsUrl());
  ws.binaryType = "arraybuffer";
  ws.onopen = () => {
    log("ws open" + ($("bypass").checked ? " (bypass mode)" : ""));
    $("btnStop").disabled = false;
  };
  ws.onclose = () => { log("ws close"); cleanup(); };
  ws.onerror = (e) => { log("ws error: " + e.type); };
  ws.onmessage = (ev) => {
    // Inject return packet
    pipeline.packets.push({ fromId: "aws", toId: "model", progress: 0, color: "#4caf50" });
    pipeline.packets.push({ fromId: "model", toId: "speakers", progress: 0, color: "#4caf50" });
    rttMs = Date.now() - lastSendTime;
    framesRecv++;
    if (!(ev.data instanceof ArrayBuffer)) {
      if (framesRecv === 1) log("warn: ws returned " + typeof ev.data + ", expected ArrayBuffer");
      return;
    }
    const pcm = new Int16Array(ev.data);
    schedulePlayback(pcm);
    if (framesRecv === 1) log(`first echo: ${pcm.length} samples, max=${pcm.reduce((m,x)=>Math.max(m,Math.abs(x)),0)}`);
  };

  // Pump AudioData frames from the track. This runs on a Promise chain
  // driven by the track's render cadence.
  let firstFrameSeen = false;
  let sentMaxRecent = 0;
  let chunkBuf = new Float32Array(frameSamples);
  let chunkWrite = 0;

  (async () => {
    try {
      while (captureActive) {
        const { value: audioData, done } = await captureReader.read();
        if (done || !audioData) break;
        // The Scarlett Solo exposes as stereo. The SM58 on Input 1 lands on
        // channel 1 (right), not channel 0 — verified empirically on the
        // 4th Gen (perChannelMax=[0, 0.21]). Read all channels and downmix
        // to mono so input polarity is device-agnostic.
        const n = audioData.numberOfFrames;
        const nCh = audioData.numberOfChannels;
        const channels = [];
        for (let c = 0; c < nCh; c++) {
          const buf = new Float32Array(n);
          audioData.copyTo(buf, { planeIndex: c, format: "f32-planar" });
          channels.push(buf);
        }
        audioData.close();

        // Mix to mono: sum channels (equal weight) — inputs from a mono mic
        // plugged into channel 0 or channel 1 both reach the worklet, and
        // true-stereo input is preserved as a downmix.
        const scratch = new Float32Array(n);
        if (nCh === 1) {
          scratch.set(channels[0]);
        } else {
          for (let i = 0; i < n; i++) {
            let s = 0;
            for (let c = 0; c < nCh; c++) s += channels[c][i];
            scratch[i] = s / nCh;
          }
        }

        if (!firstFrameSeen) {
          const maxes = channels.map(ch => {
            let m = 0;
            for (const v of ch) { const a = v < 0 ? -v : v; if (a > m) m = a; }
            return m.toFixed(4);
          });
          firstFrameSeen = true;
          log(`first AudioData: ${n} samples, nCh=${nCh}, perChannelMax=[${maxes.join(", ")}] sr=${audioData.sampleRate || "?"}`);
        }

        // Buffer into fixed-size chunks of frameSamples, emit as int16 PCM.
        for (let i = 0; i < n; i++) {
          chunkBuf[chunkWrite++] = scratch[i];
          if (chunkWrite === frameSamples) {
            const pcm = new Int16Array(frameSamples);
            let peak = 0;
            for (let k = 0; k < frameSamples; k++) {
              const s = Math.max(-1, Math.min(1, chunkBuf[k]));
              pcm[k] = s < 0 ? s * 0x8000 : s * 0x7fff;
              const a = s < 0 ? -s : s;
              if (a > peak) peak = a;
            }
            if (peak > sentMaxRecent) sentMaxRecent = Math.round(peak * 32767);
            meter.style.width = Math.min(100, peak * 100 * 4) + "%";
            if (ws && ws.readyState === 1) {
              // Inject outbound packets
              pipeline.packets.push({ fromId: "mic", toId: "browser", progress: 0, color: "#2196f3" });
              pipeline.packets.push({ fromId: "browser", toId: "aws", progress: 0, color: "#2196f3" });
              lastSendTime = Date.now();
              ws.send(pcm.buffer);
              framesSent++;
              if (framesSent % 60 === 0) {
                log(`sent=${framesSent} recv=${framesRecv} sentMax(last60)=${sentMaxRecent}`);
                sentMaxRecent = 0;
              }
            }
            chunkBuf = new Float32Array(frameSamples);
            chunkWrite = 0;
          }
        }
      }
    } catch (err) {
      log(`capture pump error: ${err.message}`);
    }
  })();
}

function schedulePlayback(int16) {
  const f32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) f32[i] = int16[i] / 32768;
  const buf = audioCtx.createBuffer(1, f32.length, actualRate);
  buf.copyToChannel(f32, 0);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  // Mono → both L/R via a ChannelMerger, same pattern as Monitor mode.
  const toStereo = audioCtx.createChannelMerger(2);
  src.connect(toStereo, 0, 0);
  src.connect(toStereo, 0, 1);

  // Connect to output analyser for spectrogram
  if (outputAnalyser) {
    src.connect(outputAnalyser);
  }

  toStereo.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  const startAt = Math.max(now + 0.005, nextPlaybackTime);
  if (framesRecv === 1) {
    src.onended = () => log(`first echo src ended (startAt=${startAt.toFixed(3)}, ctx now=${audioCtx.currentTime.toFixed(3)}, dur=${(f32.length/actualRate).toFixed(3)}s)`);
    log(`scheduling first echo: startAt=${startAt.toFixed(3)} now=${now.toFixed(3)} destCh=${audioCtx.destination.channelCount} state=${audioCtx.state}`);
  }
  src.start(startAt);
  nextPlaybackTime = startAt + f32.length / actualRate;
}

let monitorNode = null;
async function toggleMonitor() {
  if (monitorNode) {
    try { monitorNode.disconnect(); } catch (e) {}
    monitorNode = null;
    micStream?.getTracks().forEach(t => t.stop());
    micStream = null;
    log("monitor off");
    return;
  }
  await ensureCtx();
  const constraints = {
    audio: {
      deviceId: $("inDev").value ? { exact: $("inDev").value } : undefined,
      echoCancellation: false, noiseSuppression: false, autoGainControl: false,
      channelCount: 1,
    }
  };
  micStream = await navigator.mediaDevices.getUserMedia(constraints);
  const micSrc = audioCtx.createMediaStreamSource(micStream);
  // Force mono-to-stereo so both L/R outputs of the Scarlett carry the
  // same signal (X600 inputs are stereo; single-channel feed would leave
  // one side silent).
  const toStereo = audioCtx.createChannelMerger(2);
  micSrc.connect(toStereo, 0, 0);
  micSrc.connect(toStereo, 0, 1);
  toStereo.connect(audioCtx.destination);
  monitorNode = toStereo;
  log(`monitor ON: mic → destination direct, sinkId=${$("outDev").selectedOptions[0]?.textContent}`);
}

function cleanup() {
  captureActive = false;
  try { captureReader?.cancel(); } catch (e) {}
  captureReader = null;
  try { micStream?.getTracks().forEach(t => t.stop()); } catch (e) {}
  try { audioCtx?.close(); } catch (e) {}
  try { ws?.close(); } catch (e) {}
  if (animationId) {
    cancelAnimationFrame(animationId);
    animationId = null;
  }
  inputAnalyser = null;
  outputAnalyser = null;
  $("btnStart").disabled = false;
  $("btnStop").disabled = true;
  pipeline.packets = [];
  $("pipelineStats").textContent = "Ready to stream...";
}

$("btnStart").onclick = () => { start().catch(e => { log("start error: " + e.message); cleanup(); }); };
$("btnStop").onclick = cleanup;
$("btnTone").onclick = () => { playTone().catch(e => log("tone err: " + e.message)); };
$("btnMonitor").onclick = () => { toggleMonitor().catch(e => log("monitor err: " + e.message)); };

$("btnAddEndpoint").onclick = () => {
  const host = prompt("Enter backend endpoint (host:port):", "");
  if (!host) return;
  const opt = document.createElement("option");
  opt.value = host;
  opt.textContent = host;
  $("endpoint").appendChild(opt);
  $("endpoint").value = host;
  // Trigger endpoint change
  $("endpoint").dispatchEvent(new Event("change"));
};

$("endpoint").onchange = () => {
  log(`switching to backend: ${getServerHost()}`);
  // Reload models and server info for the new endpoint
  loadModels().then(() => loadServerInfo()).then(() => {
    log(`connected to ${getServerHost()}`);
  });
  // If currently streaming, reconnect
  if (ws && ws.readyState === WebSocket.OPEN) {
    log("endpoint changed — reconnecting WebSocket");
    ws.close();
    setTimeout(() => {
      if (!captureActive) return;
      ws = new WebSocket(wsUrl());
      ws.binaryType = "arraybuffer";
      ws.onopen = () => log(`ws reconnected to ${getServerHost()}`);
      ws.onclose = () => { log("ws close"); cleanup(); };
      ws.onerror = (e) => log("ws error: " + e.type);
      ws.onmessage = (ev) => {
        pipeline.packets.push({ fromId: "aws", toId: "model", progress: 0, color: "#4caf50" });
        pipeline.packets.push({ fromId: "model", toId: "speakers", progress: 0, color: "#4caf50" });
        rttMs = Date.now() - lastSendTime;
        framesRecv++;
        if (!(ev.data instanceof ArrayBuffer)) return;
        schedulePlayback(new Int16Array(ev.data));
      };
    }, 120);
  }
};
$("bypass").onchange = () => {
  if (ws && ws.readyState === WebSocket.OPEN) {
    log("bypass toggled — reconnecting");
    ws.close();
    setTimeout(() => {
      if (!captureActive) return;
      ws = new WebSocket(wsUrl());
      ws.binaryType = "arraybuffer";
      ws.onopen = () => log(`ws reconnected (bypass=${$("bypass").checked})`);
      ws.onclose = () => { log("ws close"); cleanup(); };
      ws.onerror = (e) => log("ws error: " + e.type);
      ws.onmessage = (ev) => {
        pipeline.packets.push({ fromId: "aws", toId: "model", progress: 0, color: "#4caf50" });
        pipeline.packets.push({ fromId: "model", toId: "speakers", progress: 0, color: "#4caf50" });
        rttMs = Date.now() - lastSendTime;
        framesRecv++;
        if (!(ev.data instanceof ArrayBuffer)) return;
        schedulePlayback(new Int16Array(ev.data));
      };
    }, 120);
  }
};
$("outDev").onchange = async () => {
  if (audioCtx && typeof audioCtx.setSinkId === "function") {
    try {
      await audioCtx.setSinkId($("outDev").value);
      log("sinkId → " + $("outDev").selectedOptions[0]?.textContent);
    } catch (e) { log("setSinkId err: " + e.message); }
  }
};

async function loadModels() {
  try {
    const resp = await fetch(modelsUrl());
    if (!resp.ok) return;
    const data = await resp.json();
    const sel = $("modelSel");
    sel.innerHTML = "";
    for (const [key, meta] of Object.entries(data.models)) {
      const opt = document.createElement("option");
      opt.value = key;
      opt.textContent = `${meta.label} (${meta.loss_str} dB)`;
      if (key === data.default) opt.selected = true;
      sel.appendChild(opt);
    }
    updateModelMeta();
    log(`models loaded: ${Object.keys(data.models).join(", ")} — default: ${data.default}`);
  } catch (e) {
    log("warn: could not load model list (" + e.message + ")");
  }
}

function updateModelMeta() {
  // Show params for selected model in the meta span (populated client-side from option text)
  const sel = $("modelSel");
  $("modelMeta").textContent = sel.selectedOptions[0]?.textContent || "";
}

$("modelSel").onchange = () => {
  updateModelMeta();
  // If currently streaming, reconnect with the new model.
  if (ws && ws.readyState === WebSocket.OPEN) {
    log("model changed — reconnecting WebSocket");
    ws.close();
    // start() will be re-triggered by ws.onclose → cleanup → user re-clicks Start,
    // but for a smoother UX we reconnect automatically:
    setTimeout(() => {
      if (!captureActive) return; // user already stopped
      ws = new WebSocket(wsUrl());
      ws.binaryType = "arraybuffer";
      ws.onopen = () => log(`ws reconnected (model=${$("modelSel").value})`);
      ws.onclose = () => { log("ws close"); cleanup(); };
      ws.onerror = (e) => log("ws error: " + e.type);
      ws.onmessage = (ev) => {
        framesRecv++;
        if (!(ev.data instanceof ArrayBuffer)) return;
        schedulePlayback(new Int16Array(ev.data));
      };
    }, 120);
  }
};

// Initialize endpoint dropdown from ?server= query param if present
const _serverParam = new URLSearchParams(location.search).get("server");
if (_serverParam) {
  const opt = document.createElement("option");
  opt.value = _serverParam;
  opt.textContent = _serverParam;
  opt.selected = true;
  $("endpoint").appendChild(opt);
}

listDevices()
  .then(() => loadModels())
  .then(() => loadServerInfo())
  .then(() => {
    log("ready — pick devices and press Start");
    drawPipeline(); // Initial draw
  });
navigator.mediaDevices.addEventListener("devicechange", listDevices);
</script>
</body>
